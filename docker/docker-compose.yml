services:
  api:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    ports:
      - "7000:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
      - ConnectionStrings__DefaultConnection=Host=db;Port=5432;Database=nina_erp_retail;Username=erpuser;Password=erp_password
      - Jwt__Key=TROQUE-ESTA-CHAVE-EM-PRODUCAO-MIN-32-CHARS-OBRIGATORIO!!
      - Jwt__Issuer=NinaERPRetail
      - Jwt__Audience=NinaERPRetailUsers
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: nina_erp_retail
      POSTGRES_USER: erpuser
      POSTGRES_PASSWORD: erp_password
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U erpuser -d nina_erp_retail"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

volumes:
  pgdata:
